name: Advance integer literals
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['.github/workflows/advance-integer-literals.yml']
permissions:
  contents: write
jobs:
  advance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Implement C integer literals
        shell: python
        run: |
          from pathlib import Path
          p = Path('src/frontend.rs')
          s = p.read_text()
          old = '''            b'0'..=b'9' => {
                  let s = i; while i < b.len() && b[i].is_ascii_digit() { i += 1; }
                  out.push(Token::Number(source[s..i].parse().context("invalid integer literal")?));
              }'''
          new = '''            b'0'..=b'9' => {
                  let start = i;
                  let (radix, digits_start) = if b[i] == b'0' && matches!(b.get(i + 1), Some(b'x' | b'X')) {
                      i += 2;
                      (16, i)
                  } else if b[i] == b'0' {
                      (8, i)
                  } else {
                      (10, i)
                  };
                  while i < b.len() && b[i].is_ascii_hexdigit() { i += 1; }
                  if i == digits_start { bail!("invalid integer literal at offset {start}"); }
                  let digits = &source[digits_start..i];
                  let value = i64::from_str_radix(digits, radix)
                      .with_context(|| format!("invalid integer literal {}", &source[start..i]))?;
                  out.push(Token::Number(value));
              }'''
          if old not in s:
              raise SystemExit('integer lexer anchor changed')
          s = s.replace(old, new, 1)
          anchor = '    #[test] fn parses_all_comparisons()'
          tests = '''    #[test] fn parses_c_integer_bases() {
              for (literal, expected) in [("052", 42), ("0x2a", 42), ("0X2A", 42)] {
                  let f = parse(&format!("int main(void) {{ return {literal}; }}")).unwrap();
                  assert_eq!(f.return_value, Expr::Integer(expected));
              }
          }
          #[test] fn rejects_invalid_hex_literal() {
              assert!(parse("int main(void) { return 0x; }").is_err());
          }
'''
          if anchor not in s:
              raise SystemExit('test anchor changed')
          s = s.replace(anchor, tests + anchor, 1)
          p.write_text(s)

          ci = Path('.github/workflows/ci.yml')
          c = ci.read_text()
          anchor = "          run_case literal '42' 42\n"
          extra = "          run_case octal_literal '052' 42\n          run_case hex_literal '0x2a' 42\n          run_case uppercase_hex_literal '0X2A' 42\n"
          if anchor not in c:
              raise SystemExit('CI anchor changed')
          ci.write_text(c.replace(anchor, anchor + extra, 1))
      - name: Format and test
        run: |
          cargo fmt --all
          cargo test --all-targets --all-features --locked
      - name: Commit milestone
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/frontend.rs .github/workflows/ci.yml
          git commit -m 'feat: support octal and hexadecimal integer literals'
          git push origin HEAD:main
