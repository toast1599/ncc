name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: never

jobs:
  test:
    name: Linux / Rust stable
    runs-on: ubuntu-latest
    container:
      image: rust:latest

    steps:
      - name: Install system toolchain
        shell: bash
        run: |
          set -o pipefail
          log=$(mktemp)
          if ! { apt-get update -qq && apt-get install -y -qq --no-install-recommends build-essential ca-certificates git; } >"$log" 2>&1; then
            cat "$log"
            exit 1
          fi
          rm -f "$log"
          rm -rf /var/lib/apt/lists/*

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust components
        shell: bash
        run: |
          set -o pipefail
          log=$(mktemp)
          if ! rustup component add rustfmt clippy >"$log" 2>&1; then
            cat "$log"
            exit 1
          fi
          rm -f "$log"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --quiet --all-targets --all-features -- -D warnings

      - name: Run unit tests
        run: cargo test --quiet --all-targets --all-features --locked

      - name: Build NCC
        run: cargo build --quiet --locked

      - name: Compile first C program to object code
        run: |
          cat > /tmp/ncc-smoke.c <<'EOF'
          int main(void) {
              return 42;
          }
          EOF
          cargo run --quiet --locked -- /tmp/ncc-smoke.c -o /tmp/ncc-smoke.o
          test -s /tmp/ncc-smoke.o

      - name: Link generated object
        run: cc /tmp/ncc-smoke.o -o /tmp/ncc-smoke

      - name: Execute generated program and verify exit code
        shell: bash
        run: |
          set +e
          /tmp/ncc-smoke
          status=$?
          set -e
          if [ "$status" -ne 42 ]; then
            echo "error: expected exit code 42, got $status" >&2
            exit 1
          fi
