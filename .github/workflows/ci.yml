name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: never

jobs:
  test:
    name: Linux / Rust stable
    runs-on: ubuntu-latest
    container:
      image: rust:latest

    steps:
      - name: Install system toolchain
        shell: bash
        run: |
          log=$(mktemp)
          if ! { apt-get update -qq && apt-get install -y -qq --no-install-recommends build-essential ca-certificates git; } >"$log" 2>&1; then
            cat "$log"
            exit 1
          fi
          rm -f "$log"
          rm -rf /var/lib/apt/lists/*

      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust components
        shell: bash
        run: |
          log=$(mktemp)
          if ! rustup component add rustfmt clippy >"$log" 2>&1; then
            cat "$log"
            exit 1
          fi
          rm -f "$log"

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        id: clippy
        shell: bash
        run: |
          if ! cargo clippy --quiet --all-targets --all-features -- -D warnings > /tmp/clippy.log 2>&1; then
            echo "::error::Clippy failed; diagnostics uploaded as clippy-diagnostics"
            exit 1
          fi
          rm -f /tmp/clippy.log

      - name: Upload Clippy diagnostics
        if: failure() && steps.clippy.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: /tmp/clippy.log
          if-no-files-found: error
          retention-days: 7

      - name: Run unit tests
        run: cargo test --quiet --all-targets --all-features --locked

      - name: Build NCC
        run: cargo build --quiet --locked

      - name: Test supported C expressions end to end
        shell: bash
        run: |
          set -euo pipefail

          run_case() {
            name=$1
            expr=$2
            expected=$3
            src="/tmp/ncc-${name}.c"
            obj="/tmp/ncc-${name}.o"
            exe="/tmp/ncc-${name}"

            printf 'int main(void) { return %s; }\n' "$expr" > "$src"
            cargo run --quiet --locked -- "$src" -o "$obj"
            test -s "$obj"
            cc "$obj" -o "$exe"

            set +e
            "$exe"
            status=$?
            set -e

            if [ "$status" -ne "$expected" ]; then
              echo "error: $name: expression '$expr' expected exit code $expected, got $status" >&2
              exit 1
            fi
          }

          run_case literal '42' 42
          run_case addition '40 + 2' 42
          run_case subtraction '50 - 8' 42
          run_case multiplication '6 * 7' 42
          run_case division '84 / 2' 42
          run_case remainder '92 % 50' 42
          run_case precedence '2 + 10 * 4' 42
          run_case parentheses '(2 + 5) * 6' 42
          run_case unary_minus '-(2 + 3) * 4 + 62' 42
          run_case left_assoc_sub '50 - 5 - 3' 42
          run_case left_assoc_div '168 / 2 / 2' 42
          run_case signed_division '-84 / 2 + 84' 42
          run_case signed_remainder '-8 % 5 + 45' 42
          run_case combined '100 - 6 * 9 + 8 / 2 - 16 % 7 - 6' 42
          run_case equal_true '42 == 42' 1
          run_case equal_false '42 == 41' 0
          run_case not_equal '42 != 41' 1
          run_case less_than '41 < 42' 1
          run_case less_equal '42 <= 42' 1
          run_case greater_than '43 > 42' 1
          run_case greater_equal '42 >= 42' 1
          run_case comparison_precedence '1 + 2 < 4 == 1' 1
          run_case signed_comparison '-3 < -2' 1
          run_case logical_not_zero '!0' 1
          run_case logical_not_nonzero '!42' 0
          run_case double_logical_not '!!42' 1
          run_case logical_not_precedence '!1 == 0' 1
          run_case bitwise_complement_zero '~0 + 43' 42
          run_case double_bitwise_complement '~~42' 42
          run_case mixed_unary '!~0' 0
