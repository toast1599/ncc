name: Land next compiler milestone

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: [.github/workflows/next-milestone.yml]

permissions:
  contents: write

jobs:
  integer-literals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Implement octal and hexadecimal integer constants
        shell: python
        run: |
          from pathlib import Path
          p = Path('src/frontend.rs')
          s = p.read_text()
          old = '''            b'0'..=b'9' => {
                let s = i; while i < b.len() && b[i].is_ascii_digit() { i += 1; }
                out.push(Token::Number(source[s..i].parse().context("invalid integer literal")?));
            }'''
          new = '''            b'0'..=b'9' => {
                let start = i;
                let (radix, digits_start) = if b[i] == b'0' && matches!(b.get(i + 1), Some(b'x' | b'X')) {
                    i += 2;
                    (16, i)
                } else if b[i] == b'0' {
                    i += 1;
                    (8, start)
                } else {
                    (10, start)
                };
                while i < b.len() && b[i].is_ascii_alphanumeric() { i += 1; }
                if i == digits_start {
                    bail!("invalid integer literal at offset {start}");
                }
                let digits = &source[digits_start..i];
                let value = i64::from_str_radix(digits, radix)
                    .with_context(|| format!("invalid integer literal {literal:?}", literal = &source[start..i]))?;
                out.push(Token::Number(value));
            }'''
          if old not in s:
              raise SystemExit('numeric lexer block did not match expected main state')
          s = s.replace(old, new, 1)
          marker = '    #[test] fn parses_all_comparisons()'
          tests = '''    #[test]
    fn parses_c_integer_bases() {
        for (literal, expected) in [("052", 42), ("0x2a", 42), ("0X2A", 42)] {
            let f = parse(&format!("int main(void) {{ return {literal}; }}")).unwrap();
            assert_eq!(f.return_value, Expr::Integer(expected));
        }
    }
    #[test]
    fn rejects_invalid_integer_digits() {
        for literal in ["0x", "09", "0x2g"] {
            assert!(parse(&format!("int main(void) {{ return {literal}; }}")).is_err());
        }
    }
'''
          s = s.replace(marker, tests + marker, 1)
          p.write_text(s)
      - name: Extend end-to-end coverage
        shell: python
        run: |
          from pathlib import Path
          p = Path('.github/workflows/ci.yml')
          s = p.read_text()
          marker = "          run_case literal '42' 42\n"
          addition = "          run_case octal_literal '052' 42\n          run_case hex_literal '0x2a' 42\n          run_case uppercase_hex_literal '0X2A' 42\n"
          if marker not in s:
              raise SystemExit('CI literal marker missing')
          p.write_text(s.replace(marker, marker + addition, 1))
      - name: Format generated changes
        run: cargo fmt --all
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-targets --all-features --locked
      - run: cargo build --locked
      - name: Commit tested milestone
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/frontend.rs .github/workflows/ci.yml
          git commit -m 'feat: support octal and hexadecimal integer literals'
          git push origin HEAD:main

# Touch this workflow to rerun the guarded milestone after delivery-path fixes.
